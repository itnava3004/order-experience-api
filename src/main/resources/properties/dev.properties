# order-experience-api — Environment Properties
env=dev

# API Manager Instance ID (Step 2: Create API Instance in Anypoint API Manager)
# Replace with the actual Instance ID shown in API Manager after creating the API instance
api.id=API_INSTANCE_ID
http.host=0.0.0.0
http.port=8081
api.basePath=/api/v1

# Downstream API Hosts
api.process.host=dev-internal.example.com
api.process.port=8082
api.process.basePath=/api/v1
api.customer.host=localhost
api.customer.port=8083
api.customer.basePath=/api/v1
api.inventory.host=localhost
api.inventory.port=8084
api.inventory.basePath=/api/v1
api.payment.host=localhost
api.payment.port=8085
api.payment.basePath=/api/v1
api.shipping.host=localhost
api.shipping.port=8086
api.shipping.basePath=/api/v1

# Timeouts (ms)
http.request.timeout=10000
http.response.timeout=30000

# OAuth2
oauth2.token.url=https://auth.example.com/oauth2/token
oauth2.client.id=${secure::oauth2.clientId}
oauth2.client.secret=${secure::oauth2.clientSecret}

# Logging
app.name=order-experience-api
app.version=1.0.0